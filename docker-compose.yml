services:
 
  mysql:
    image: mohammadadnankhan/mysql-cont
    container_name: mysql-bankapp
    environment: 
      MYSQL_ROOT_PASSWORD: Test@123
      MYSQL_DATABASE: bankappdb
    
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pTest@123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

      
    ports: 
      - "3306:3306"

    volumes:
      - mysql-vol:/var/lib/mysql


    networks:
      - bankapp-nw


  Bankapp:
    image: mohammadadnankhan/ai-bankapp
    container_name: bankapp
    ports:
      - "8080:8080"
    environment:
      MYSQL_HOST: mysql-bankapp
      MYSQL_PORT: 3306
      MYSQL_DATABASE: bankappdb
      MYSQL_USER: root  
      MYSQL_PASSWORD: Test@123
      OLLAMA_URL: http://ollama:11434
    depends_on: 
      mysql:
        condition: service_healthy

    networks:
      - bankapp-nw


  ollama: 
    image: mohammadadnankhan/ollama
    container_name: ollama_AI
    ports: 
      - "11434:11434"
    networks:
      - bankapp-nw
    volumes:
      - ollama_data:/root/.ollama    

        

networks:
  bankapp-nw:
    driver: bridge

volumes: 
  mysql-vol:
  ollama_data:
